name: unit

on:
  workflow_call:


permissions: {}

jobs:
  unit-tests:
    name: unit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Calculate go version
      id: vars
      run: echo "go_version=$(make go-version)" >> $GITHUB_OUTPUT
    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: ${{ steps.vars.outputs.go_version }}
    - name: Build provisioner plugins
      run: make ironic-plugin demo-plugin
    - name: Run unit tests
      run: make -e unit-cover
      env:
        TEST_FLAGS: "-v"
    - name: Install libvirt-dev
      run: sudo apt-get update && sudo apt-get install -y libvirt-dev
    - name: Run vbmctl unit tests
      run: make -e unit-vbmctl
      env:
        TEST_FLAGS: "-v"
