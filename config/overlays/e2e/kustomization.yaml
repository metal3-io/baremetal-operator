apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../basic-auth_tls
- ./namespaced/automated-cleaning-resources.yaml
- ./namespaced/basic-ops-resources.yaml
- ./namespaced/external-inspection-resources.yaml
- ./namespaced/externally-provisioned-resources.yaml
- ./namespaced/inspection-resources.yaml
- ./namespaced/live-iso-ops-resources.yaml
- ./namespaced/provisioning-ops-resources.yaml
- ./namespaced/re-inspection-resources.yaml

configMapGenerator:
- name: ironic
  namespace: baremetal-operator-system
  behavior: create
  envs:
  - ironic.env

patches:
- patch: |
    # Don't try to pull again the pre-loaded image
    - op: replace
      path: /spec/template/spec/containers/0/imagePullPolicy
      value: IfNotPresent
  target:
    kind: Deployment
    name: controller-manager
# Remove ClusterRoleBinding (namaspace scoped mode)
- patch: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: baremetal-operator-manager-rolebinding
    $patch: delete
# Remove ClusterRole (namaspace scoped mode)
- patch: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: baremetal-operator-manager-role
    $patch: delete
- path: ./namespaced/namespaced-manager-patch.yaml

images:
- name: quay.io/metal3-io/baremetal-operator
  newTag: e2e

# We cannot use suffix hashes since the kustomizations we build on
# cannot be aware of what suffixes we add.
generatorOptions:
  disableNameSuffixHash: true

# NOTE: These credentials are generated automatically in hack/ci-e2e.sh
secretGenerator:
- name: ironic-credentials
  namespace: baremetal-operator-system
  files:
  - username=ironic-username
  - password=ironic-password
