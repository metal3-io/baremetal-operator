apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ns-foo.yaml
- ns-bar.yaml
- ns-quo.yaml

patches:
# Remove ClusterRoleBinding (namaspace scoped mode)
- patch: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: baremetal-operator-manager-rolebinding
    $patch: delete
# Remove ClusterRole (namaspace scoped mode)
- patch: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: baremetal-operator-manager-role
    $patch: delete
- path: ./namespaced-manager-patch.yaml
